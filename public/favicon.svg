<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 100 100">
  <!-- Top-left outer and inner squares -->
  <rect x="0" y="0" width="35" height="35" rx="4" class="icon-stroke" stroke-width="8" fill="none"/>
  <rect x="10" y="10" width="15" height="15" rx="1" class="icon-fill"/>
  
  <!-- Top-right outer and inner squares -->
  <rect x="65" y="0" width="35" height="35" rx="4" class="icon-stroke" stroke-width="8" fill="none"/>
  <rect x="75" y="10" width="15" height="15" rx="1" class="icon-fill"/>
  
  <!-- Bottom-left outer and inner squares -->
  <rect x="0" y="65" width="35" height="35" rx="4" class="icon-stroke" stroke-width="8" fill="none"/>
  <rect x="10" y="75" width="15" height="15" rx="1" class="icon-fill"/>
  
  <!-- Bottom-right pixel clusters -->
  <rect x="65" y="65" width="12" height="12" rx="1" class="icon-fill"/>
  <rect x="83" y="65" width="17" height="12" rx="1" class="icon-fill"/>
  <rect x="65" y="83" width="12" height="17" rx="1" class="icon-fill"/>
  <rect x="83" y="83" width="17" height="17" rx="2" class="icon-fill"/>
  
  <style>
    .icon-stroke { stroke: #000; }
    .icon-fill { fill: #000; }
    @media (prefers-color-scheme: dark) {
      .icon-stroke { stroke: #FFF; }
      .icon-fill { fill: #FFF; }
    }
  </style>
</svg>
